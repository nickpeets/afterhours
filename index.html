<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFTERHOURS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#14090f; --velvet:#2a0f1e; --velvet-2:#3d1329;
  --neon:#ff3d7f; --neon-soft:#ff7aa8; --gold:#f5c04e;
  --cool:#7ee0d2; --paper:#fdf3ec; --dim:#8a6a78; --danger:#ff5c47;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--ink);color:var(--paper);font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;overflow:hidden}
h1,h2,h3{font-family:"Alfa Slab One",Georgia,serif;font-weight:400}
#app{height:100vh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative;background:linear-gradient(180deg,var(--ink),var(--velvet))}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,61,127,.25);background:rgba(20,9,15,.9);z-index:20}
.logo{font-family:"Alfa Slab One",Georgia,serif;font-size:19px;color:var(--paper)}
.logo em{color:var(--neon);font-style:normal}
.wallet{display:flex;gap:8px;align-items:center;font-size:13px}
.chip{background:rgba(245,192,78,.12);border:1px solid rgba(245,192,78,.4);color:var(--gold);padding:4px 10px;border-radius:999px;font-weight:600}
.iconbtn{background:none;border:1px solid var(--dim);color:var(--dim);border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer}
main{flex:1;overflow-y:auto;position:relative}
/* AUTH / PROFILE */
#auth{position:absolute;inset:0;background:linear-gradient(165deg,#14090f,#3d1329);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:14px;overflow-y:auto}
#auth.hide{display:none}
#auth h1{font-size:36px;color:var(--paper)}
#auth h1 em{color:var(--neon);font-style:normal}
.lsub{font-size:12px;color:var(--neon-soft);text-align:center;margin-bottom:6px;line-height:1.5}
.panel{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.panel input{background:rgba(253,243,236,.07);border:1px solid rgba(253,243,236,.2);border-radius:10px;color:var(--paper);padding:11px 14px;font-size:14px;outline:none;width:100%}
.panel input:focus{border-color:var(--neon)}
.lrow{display:flex;gap:10px;align-items:center}
.lpreview{width:86px;height:86px;border-radius:16px;border:2px solid var(--gold);background-size:cover;flex-shrink:0}
.lpicks{flex:1;display:flex;flex-direction:column;gap:7px}
.llabel{font-size:9px;letter-spacing:.12em;color:var(--dim);font-weight:800}
.swatches{display:flex;gap:6px;flex-wrap:wrap}
.sw{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.sw.on{border-color:var(--gold)}
.hstyle{border:1px solid rgba(253,243,236,.25);background:transparent;color:var(--paper);border-radius:999px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer}
.hstyle.on{background:var(--neon);border-color:var(--neon)}
.bigbtn{margin-top:6px;padding:14px;border:none;border-radius:12px;background:var(--neon);color:#fff;font-size:16px;font-weight:800;cursor:pointer;width:100%;font-family:"Alfa Slab One",Georgia,serif;letter-spacing:.03em}
.bigbtn:disabled{opacity:.5;cursor:not-allowed}
.linkbtn{background:none;border:none;color:var(--neon-soft);font-size:13px;cursor:pointer;text-decoration:underline}
.note{font-size:10px;color:var(--dim);text-align:center;line-height:1.5}
.tabrow{display:flex;gap:8px;width:100%;max-width:360px;margin-bottom:4px}
.tab{flex:1;padding:9px;border:1px solid rgba(253,243,236,.2);background:transparent;color:var(--dim);border-radius:10px;font-weight:700;font-size:13px;cursor:pointer}
.tab.on{background:var(--neon);color:#fff;border-color:var(--neon)}
.err{color:var(--danger);font-size:12px;text-align:center;min-height:16px}
/* LOBBY */
#lobby{padding:14px}
.golive{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(180deg,#ffd75e,#ffb52e);color:#4a2a00;font-size:16px;font-weight:800;font-family:"Alfa Slab One",Georgia,serif;letter-spacing:.03em;cursor:pointer;margin-bottom:16px;box-shadow:0 4px 0 #8a5a12}
.golive:active{transform:translateY(3px);box-shadow:0 1px 0 #8a5a12}
.sectlabel{font-size:11px;letter-spacing:.12em;color:var(--dim);font-weight:800;margin:6px 2px 10px}
.roomlist{display:flex;flex-direction:column;gap:12px}
.roomcard{position:relative;border-radius:16px;overflow:hidden;border:1px solid rgba(255,61,127,.25);background:rgba(61,19,41,.4);padding:16px;cursor:pointer;transition:border-color .15s}
.roomcard:hover{border-color:var(--neon)}
.roomcard .live{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--danger);margin-bottom:6px}
.livedot{width:7px;height:7px;border-radius:50%;background:var(--danger);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.roomcard h2{font-size:22px;color:var(--gold);margin-bottom:3px}
.roomcard .tag{font-size:13px;color:var(--neon-soft);margin-bottom:8px}
.roomcard .meta{font-size:12px;color:var(--dim)}
.roomcard .yours{position:absolute;top:12px;right:12px;background:var(--neon);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:999px;letter-spacing:.08em}
.empty{text-align:center;color:var(--dim);padding:40px 20px;font-size:13px;line-height:1.7}
/* MODAL */
.modal{position:absolute;inset:0;background:rgba(20,9,15,.92);z-index:80;display:none;align-items:center;justify-content:center;padding:24px}
.modal.show{display:flex}
.mbox{background:var(--velvet-2);border:1px solid var(--neon);border-radius:16px;padding:20px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.mbox h3{font-size:18px}
.mbox input{background:rgba(253,243,236,.07);border:1px solid rgba(253,243,236,.2);border-radius:10px;color:var(--paper);padding:11px 14px;font-size:14px;outline:none}
.mbox input:focus{border-color:var(--neon)}
.mrow{display:flex;gap:8px}
.mrow button{flex:1;padding:12px;border-radius:10px;border:none;font-weight:700;cursor:pointer}
.mcancel{background:transparent;border:1.5px solid var(--dim);color:var(--dim)}
.mgo{background:var(--neon);color:#fff}
#toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:rgba(20,9,15,.95);border:1px solid var(--neon);color:var(--paper);padding:10px 18px;border-radius:12px;font-size:13px;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;max-width:88%;text-align:center}
#toast.show{opacity:1}
.spinner{width:26px;height:26px;border:3px solid rgba(255,61,127,.3);border-top-color:var(--neon);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
/* ROOM VIEW (C1) */
#room{display:none;flex-direction:column;height:100%}
#room.show{display:flex}
.roomtop{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(255,61,127,.2)}
.backbtn{background:none;border:none;color:var(--neon-soft);font-size:14px;cursor:pointer;padding:6px}
.roomtitle{font-size:15px;font-weight:700;font-family:"Alfa Slab One",Georgia,serif}
.roomtop .cnt{font-size:11px;color:var(--dim)}
.stagewrap{flex:1;overflow-y:auto;padding:14px}
.contestant-hero{border-radius:16px;border:2px solid var(--gold);overflow:hidden;position:relative;height:160px;margin-bottom:14px}
.contestant-hero .vid{position:absolute;inset:0;background-size:cover;background-position:center}
.contestant-hero .plate{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(20,9,15,.9))}
.contestant-hero .role{font-size:10px;letter-spacing:.14em;color:var(--gold)}
.contestant-hero .nm{font-weight:700;font-size:17px}
.hostbadge{position:absolute;top:10px;right:10px;background:var(--neon);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:999px;letter-spacing:.08em}
.rostersect{margin-bottom:16px}
.rlabel{font-size:11px;letter-spacing:.12em;color:var(--dim);font-weight:800;margin-bottom:8px}
.roster{display:flex;flex-wrap:wrap;gap:8px}
.person{display:flex;align-items:center;gap:8px;background:rgba(253,243,236,.05);border:1px solid rgba(253,243,236,.12);border-radius:999px;padding:5px 12px 5px 6px;font-size:12px}
.person .pf{width:24px;height:24px;border-radius:50%;background-size:cover;flex-shrink:0}
.person.me{border-color:var(--neon)}
.person .youdot{color:var(--neon);font-weight:800;font-size:10px}
.roomact{padding:12px 14px;border-top:1px solid rgba(255,61,127,.2);display:flex;gap:8px}
.roomact button{flex:1;padding:13px;border:none;border-radius:12px;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
.joinline{background:var(--neon);color:#fff}
.leaveroom{background:transparent;border:1.5px solid var(--dim);color:var(--dim)}
.emptyrole{color:var(--dim);font-size:12px;font-style:italic}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">AFTER<em>HOURS</em></div>
    <div class="wallet">
      <span class="chip" id="coinchip">&#10022; 120</span>
      <button class="iconbtn" id="signout" style="display:none">Sign out</button>
    </div>
  </header>
  <main>
    <!-- AUTH -->
    <div id="auth">
      <h1>AFTER<em>HOURS</em></h1>
      <div class="lsub">The live dating game show.<br>Create yourself to step inside.</div>
      <div class="tabrow">
        <button class="tab on" id="tab_signup">New here</button>
        <button class="tab" id="tab_login">I have an account</button>
      </div>
      <div class="panel" id="signupPanel">
        <div class="lrow">
          <div class="lpreview" id="lpreview"></div>
          <div class="lpicks">
            <div class="llabel">SKIN</div><div class="swatches" id="lskin"></div>
            <div class="llabel">HAIR</div><div class="swatches" id="lhaircolor"></div>
          </div>
        </div>
        <div class="swatches" id="lhairstyle"></div>
        <input type="text" id="su_name" placeholder="Display name" maxlength="18">
        <input type="text" id="su_occ" placeholder="Occupation — she'll see this on your card" maxlength="26">
        <input type="text" id="su_bio" placeholder="One line about you — make it count" maxlength="70">
        <input type="email" id="su_email" placeholder="Email">
        <input type="password" id="su_pass" placeholder="Password (6+ characters)">
        <div class="err" id="su_err"></div>
        <button class="bigbtn" id="su_go">Create account &amp; step inside</button>
      </div>
      <div class="panel" id="loginPanel" style="display:none">
        <input type="email" id="li_email" placeholder="Email">
        <input type="password" id="li_pass" placeholder="Password">
        <div class="err" id="li_err"></div>
        <button class="bigbtn" id="li_go">Log in</button>
      </div>
      <div class="note">Pilot build · play money · this is a private test with friends.</div>
    </div>
    <!-- LOBBY -->
    <div id="lobby" style="display:none">
      <button class="golive" id="golive">● GO LIVE — Host Your Room</button>
      <div class="sectlabel">LIVE NOW</div>
      <div class="roomlist" id="roomlist"></div>
    </div>
    <!-- ROOM (C1) -->
    <div id="room">
      <div class="roomtop">
        <button class="backbtn" id="roomback">‹ Lobby</button>
        <div class="roomtitle" id="rt_title"></div>
        <div class="cnt" id="rt_count">👁 0</div>
      </div>
      <div class="stagewrap">
        <div class="contestant-hero">
          <div class="vid" id="rt_vid"></div>
          <div class="hostbadge" id="rt_hostbadge" style="display:none">HOST</div>
          <div class="plate"><div class="role">TONIGHT'S CONTESTANT</div><div class="nm" id="rt_host"></div></div>
        </div>
        <div class="rostersect">
          <div class="rlabel">IN THE CHAIRS</div>
          <div class="roster" id="rt_chairs"><span class="emptyrole">no one seated yet</span></div>
        </div>
        <div class="rostersect">
          <div class="rlabel">THE LINE</div>
          <div class="roster" id="rt_line"><span class="emptyrole">line is empty</span></div>
        </div>
        <div class="rostersect">
          <div class="rlabel">WATCHING</div>
          <div class="roster" id="rt_spectators"><span class="emptyrole">just you so far</span></div>
        </div>
      </div>
      <div class="roomact">
        <button class="leaveroom" id="rt_leave">Leave</button>
        <button class="joinline" id="rt_joinline">Join the Line</button>
      </div>
    </div>
    <!-- GO LIVE MODAL -->
    <div class="modal" id="livemodal">
      <div class="mbox">
        <h3>Go live</h3>
        <input type="text" id="gl_name" placeholder="Your show name (e.g. Marisol's Room)" maxlength="30">
        <input type="text" id="gl_tag" placeholder="Tagline — what you're looking for" maxlength="60">
        <div class="mrow">
          <button class="mcancel" onclick="document.getElementById('livemodal').classList.remove('show')">Cancel</button>
          <button class="mgo" id="gl_go">Go Live</button>
        </div>
      </div>
    </div>
    <div id="toast"></div>
  </main>
</div>
<script>
/* ============ SUPABASE ============ */
const SUPA_URL="https://doqtfyxgzlfvglfdkphx.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvcXRmeXhnemxmdmdsZmRrcGh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzMzIyMTYsImV4cCI6MjA5OTkwODIxNn0.Bx0i5-f-dFYnlXUamPbIxObP0YLAtsOudXKe9tngskI";
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
const $=id=>document.getElementById(id);
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2600);}
/* ============ FACE BUILDER ============ */
function face(o){
  const hairS={
    short:`<path d="M25 50 Q24 20 50 20 Q76 20 75 50 Q75 33 50 30 Q25 33 25 50" fill="${o.hair}"/>`,
    long:`<path d="M24 46 Q22 16 50 16 Q78 16 76 46 L79 86 L63 86 Q71 58 69 40 Q59 27 50 27 Q41 27 31 40 Q29 58 37 86 L21 86 Z" fill="${o.hair}"/>`,
    bun:`<circle cx="50" cy="16" r="9" fill="${o.hair}"/><path d="M26 48 Q25 22 50 21 Q75 22 74 48 Q74 33 50 31 Q26 33 26 48" fill="${o.hair}"/>`,
    curly:`<circle cx="32" cy="32" r="10" fill="${o.hair}"/><circle cx="44" cy="24" r="10" fill="${o.hair}"/><circle cx="58" cy="24" r="10" fill="${o.hair}"/><circle cx="69" cy="33" r="9" fill="${o.hair}"/><path d="M26 48 Q26 30 50 28 Q74 30 74 48 Q74 36 50 34 Q26 36 26 48" fill="${o.hair}"/>`,
    buzz:`<path d="M27 44 Q28 24 50 23 Q72 24 73 44 Q72 34 50 32 Q28 34 27 44" fill="${o.hair}" opacity=".55"/>`
  }[o.style||"short"];
  const glasses=o.glasses?`<circle cx="41" cy="51" r="6.5" fill="none" stroke="#2a1a10" stroke-width="1.8"/><circle cx="59" cy="51" r="6.5" fill="none" stroke="#2a1a10" stroke-width="1.8"/><line x1="47.5" y1="51" x2="52.5" y2="51" stroke="#2a1a10" stroke-width="1.8"/>`:"";
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="${o.bg}"/><ellipse cx="50" cy="112" rx="36" ry="28" fill="${o.shirt}"/><rect x="43" y="70" width="14" height="16" rx="5" fill="${o.skin}"/><ellipse cx="50" cy="51" rx="23" ry="26" fill="${o.skin}"/>${hairS}<circle cx="41" cy="51" r="2.4" fill="#2a1a10"/><circle cx="59" cy="51" r="2.4" fill="#2a1a10"/><path d="M43 64 Q50 70 57 64" fill="none" stroke="#a35f4d" stroke-width="2.4" stroke-linecap="round"/><ellipse cx="34" cy="59" rx="3.4" ry="2" fill="#ff9d9d" opacity=".5"/><ellipse cx="66" cy="59" rx="3.4" ry="2" fill="#ff9d9d" opacity=".5"/>${glasses}</svg>`;
  return `${o.bg} url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}") center/cover no-repeat`;
}
const SKINS=["#f3cfa6","#e2b088","#c98e62","#9c6238","#7a4a2c"];
const HAIRC=["#2b1c11","#5c3a1c","#8c3b13","#111111","#b5651d"];
const STYLES=["short","long","bun","curly","buzz"];
const P={skin:SKINS[1],hair:HAIRC[0],style:"short"};
function faceCss(p){return face({bg:"#a8325e",skin:p.skin,hair:p.hair,style:p.style,shirt:"#ff3d7f"});}
function drawPreview(){$("lpreview").style.background=faceCss(P);}
function buildPickers(){
  SKINS.forEach(c=>{const b=document.createElement("div");b.className="sw"+(c===P.skin?" on":"");b.style.background=c;b.onclick=()=>{P.skin=c;$("lskin").querySelectorAll(".sw").forEach(x=>x.classList.toggle("on",x===b));drawPreview();};$("lskin").appendChild(b);});
  HAIRC.forEach(c=>{const b=document.createElement("div");b.className="sw"+(c===P.hair?" on":"");b.style.background=c;b.onclick=()=>{P.hair=c;$("lhaircolor").querySelectorAll(".sw").forEach(x=>x.classList.toggle("on",x===b));drawPreview();};$("lhaircolor").appendChild(b);});
  STYLES.forEach(s=>{const b=document.createElement("button");b.className="hstyle"+(s===P.style?" on":"");b.textContent=s;b.onclick=()=>{P.style=s;$("lhairstyle").querySelectorAll(".hstyle").forEach(x=>x.classList.toggle("on",x===b));drawPreview();};$("lhairstyle").appendChild(b);});
  drawPreview();
}
/* ============ AUTH TABS ============ */
$("tab_signup").onclick=()=>{$("tab_signup").classList.add("on");$("tab_login").classList.remove("on");$("signupPanel").style.display="flex";$("loginPanel").style.display="none";};
$("tab_login").onclick=()=>{$("tab_login").classList.add("on");$("tab_signup").classList.remove("on");$("loginPanel").style.display="flex";$("signupPanel").style.display="none";};
/* ============ SIGN UP ============ */
$("su_go").onclick=async()=>{
  const name=$("su_name").value.trim(), occ=$("su_occ").value.trim(), bio=$("su_bio").value.trim();
  const email=$("su_email").value.trim(), pass=$("su_pass").value;
  const err=$("su_err"); err.textContent="";
  if(!name){err.textContent="Pick a display name.";return;}
  if(!email||!pass){err.textContent="Email and password required.";return;}
  if(pass.length<6){err.textContent="Password needs 6+ characters.";return;}
  $("su_go").disabled=true; $("su_go").textContent="Creating…";
  const {data,error}=await sb.auth.signUp({email,password:pass});
  if(error){err.textContent=error.message;$("su_go").disabled=false;$("su_go").textContent="Create account & step inside";return;}
  const uid=data.user?.id;
  if(uid){
    const {error:pe}=await sb.from("profiles").upsert({id:uid,display_name:name,occupation:occ||"MYSTERY",bio:bio||"One tap from the room.",face_json:P});
    if(pe){err.textContent="Profile save failed: "+pe.message;$("su_go").disabled=false;$("su_go").textContent="Create account & step inside";return;}
  }
  if(data.session){ enterApp(); }
  else { toast("Account made — check your email to confirm, then log in."); $("tab_login").click(); $("su_go").disabled=false; $("su_go").textContent="Create account & step inside"; }
};
/* ============ LOGIN ============ */
$("li_go").onclick=async()=>{
  const email=$("li_email").value.trim(), pass=$("li_pass").value;
  const err=$("li_err"); err.textContent="";
  $("li_go").disabled=true; $("li_go").textContent="Logging in…";
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message;$("li_go").disabled=false;$("li_go").textContent="Log in";return;}
  enterApp();
};
$("signout").onclick=async()=>{await sb.auth.signOut();location.reload();};
/* ============ APP ENTRY ============ */
let ME=null, MYPROFILE=null;
async function enterApp(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user){return;}
  ME=user;
  const {data:prof}=await sb.from("profiles").select("*").eq("id",user.id).single();
  MYPROFILE=prof;
  $("auth").classList.add("hide");
  $("lobby").style.display="block";
  $("signout").style.display="inline-block";
  loadRooms();
  subscribeLobby();
}
/* ============ LOBBY ============ */
async function loadRooms(){
  const list=$("roomlist");
  list.innerHTML='<div class="spinner"></div>';
  const {data:rooms,error}=await sb.from("rooms").select("*").eq("status","live").order("created_at",{ascending:false});
  if(error){list.innerHTML='<div class="empty">Couldn\'t load rooms: '+error.message+'</div>';return;}
  if(!rooms||!rooms.length){
    list.innerHTML='<div class="empty">No live rooms yet.<br>Be the first — hit <b>GO LIVE</b> and your friends will see your room appear here in real time.</div>';
    return;
  }
  const ids=rooms.map(r=>r.id);
  const {data:members}=await sb.from("room_members").select("room_id,role").in("room_id",ids);
  const counts={};
  (members||[]).forEach(m=>{ if(m.role!=='gone'){counts[m.room_id]=(counts[m.room_id]||0)+1;} });
  list.innerHTML="";
  rooms.forEach(r=>{
    const card=document.createElement("div"); card.className="roomcard";
    const mine=r.host_id===ME.id;
    card.innerHTML=`${mine?'<div class="yours">YOUR ROOM</div>':''}
      <div class="live"><span class="livedot"></span>LIVE</div>
      <h2>${escapeHtml(r.contestant_name||"Untitled Room")}</h2>
      <div class="tag">${escapeHtml(r.tagline||"")}</div>
      <div class="meta">👁 ${counts[r.id]||0} in the room</div>`;
    card.onclick=()=>openRoom(r);
    list.appendChild(card);
  });
}
function escapeHtml(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
/* live lobby updates */
function subscribeLobby(){
  sb.channel("lobby")
    .on("postgres_changes",{event:"*",schema:"public",table:"rooms"},()=>loadRooms())
    .on("postgres_changes",{event:"*",schema:"public",table:"room_members"},()=>loadRooms())
    .subscribe();
}
/* ============ GO LIVE ============ */
$("golive").onclick=()=>{
  $("gl_name").value = (MYPROFILE?.display_name||"My")+"'s Room";
  $("livemodal").classList.add("show");
};
$("gl_go").onclick=async()=>{
  const name=$("gl_name").value.trim(), tag=$("gl_tag").value.trim();
  if(!name){toast("Give your show a name.");return;}
  $("gl_go").disabled=true;
  const {data,error}=await sb.from("rooms").insert({host_id:ME.id,contestant_name:name,tagline:tag,status:"live"}).select().single();
  $("gl_go").disabled=false;
  if(error){toast("Couldn't go live: "+error.message);return;}
  $("livemodal").classList.remove("show");
  toast("You're LIVE — your room is in the lobby.");
  openRoom(data);
};
/* ============ ROOM VIEW (C1) ============ */
let CURRENT_ROOM=null, ROOM_CHANNEL=null, HOST_PROFILE=null;
async function openRoom(r){
  CURRENT_ROOM=r;
  $("lobby").style.display="none";
  $("room").classList.add("show");
  $("rt_title").textContent=r.contestant_name||"Room";
  $("rt_host").textContent=r.contestant_name||"";
  const amHost=r.host_id===ME.id;
  $("rt_hostbadge").style.display=amHost?"block":"none";
  $("rt_joinline").style.display=amHost?"none":"block";
  const {data:hp}=await sb.from("profiles").select("*").eq("id",r.host_id).single();
  HOST_PROFILE=hp;
  $("rt_vid").style.background = hp?.face_json ? faceCss(hp.face_json) : "linear-gradient(135deg,#8e2d56,#e0637f)";
  const {error:je}=await sb.rpc("join_room",{room_id:r.id});
  if(je && !je.message.includes("duplicate")) console.log("join_room:",je.message);
  await renderRoster();
  subscribeRoom(r.id);
}
async function renderRoster(){
  if(!CURRENT_ROOM) return;
  const {data:members,error}=await sb.from("room_members")
    .select("user_id,role,seat_index").eq("room_id",CURRENT_ROOM.id).neq("role","gone");
  if(error){console.log("roster:",error.message);return;}
  const uids=[...new Set(members.map(m=>m.user_id))];
  let profs={};
  if(uids.length){
    const {data:pl}=await sb.from("profiles").select("id,display_name,face_json").in("id",uids);
    (pl||[]).forEach(p=>profs[p.id]=p);
  }
  const chairs=members.filter(m=>m.role==="chair"||m.role==="kept").sort((a,b)=>(a.seat_index||0)-(b.seat_index||0));
  const line=members.filter(m=>m.role==="line");
  const specs=members.filter(m=>m.role==="spectator");
  $("rt_count").textContent="👁 "+members.length;
  const pill=(m)=>{
    const p=profs[m.user_id];
    const nm=p?.display_name||"someone";
    const fc=p?.face_json?faceCss(p.face_json):"#555";
    const isMe=m.user_id===ME.id;
    return `<div class="person${isMe?' me':''}"><div class="pf" style="background:${fc}"></div>${escapeHtml(nm)}${isMe?' <span class="youdot">YOU</span>':''}${m.role==="kept"?' ✦':''}</div>`;
  };
  $("rt_chairs").innerHTML = chairs.length? chairs.map(pill).join("") : '<span class="emptyrole">no one seated yet</span>';
  $("rt_line").innerHTML = line.length? line.map(pill).join("") : '<span class="emptyrole">line is empty</span>';
  $("rt_spectators").innerHTML = specs.length? specs.map(pill).join("") : '<span class="emptyrole">no spectators</span>';
}
function subscribeRoom(roomId){
  if(ROOM_CHANNEL){ sb.removeChannel(ROOM_CHANNEL); ROOM_CHANNEL=null; }
  ROOM_CHANNEL=sb.channel("room:"+roomId)
    .on("postgres_changes",{event:"*",schema:"public",table:"room_members",filter:"room_id=eq."+roomId},()=>renderRoster())
    .subscribe();
}
$("rt_joinline").onclick=async()=>{
  const {error}=await sb.rpc("join_line",{room_id:CURRENT_ROOM.id});
  if(error){toast("Couldn't join line: "+error.message);return;}
  toast("You're in the line.");
  renderRoster();
};
$("rt_leave").onclick=()=>leaveRoom();
$("roomback").onclick=()=>leaveRoom();
function leaveRoom(){
  if(ROOM_CHANNEL){ sb.removeChannel(ROOM_CHANNEL); ROOM_CHANNEL=null; }
  CURRENT_ROOM=null;
  $("room").classList.remove("show");
  $("lobby").style.display="block";
  loadRooms();
}
/* ============ SESSION RESTORE ============ */
(async()=>{
  buildPickers();
  const {data:{session}}=await sb.auth.getSession();
  if(session){ enterApp(); }
})();
</script>
