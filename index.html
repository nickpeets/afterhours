<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AFTERHOURS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#14090f; --velvet:#2a0f1e; --velvet-2:#3d1329;
  --neon:#ff3d7f; --neon-soft:#ff7aa8; --gold:#f5c04e;
  --cool:#7ee0d2; --paper:#fdf3ec; --dim:#8a6a78; --danger:#ff5c47;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--ink);color:var(--paper);font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;overflow:hidden;touch-action:pan-x pan-y;-webkit-text-size-adjust:100%}
h1,h2,h3{font-family:"Alfa Slab One",Georgia,serif;font-weight:400}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative;background:linear-gradient(180deg,var(--ink),var(--velvet))}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,61,127,.25);background:rgba(20,9,15,.9);z-index:20}
.logo{font-family:"Alfa Slab One",Georgia,serif;font-size:19px;color:var(--paper)}
.logo em{color:var(--neon);font-style:normal}
.wallet{display:flex;gap:8px;align-items:center;font-size:13px}
.chip{background:rgba(245,192,78,.12);border:1px solid rgba(245,192,78,.4);color:var(--gold);padding:4px 10px;border-radius:999px;font-weight:600}
.iconbtn{background:none;border:1px solid var(--dim);color:var(--dim);border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer}
main{flex:1;overflow-y:auto;position:relative}

/* AUTH / PROFILE */
#auth{position:absolute;inset:0;background:linear-gradient(165deg,#14090f,#3d1329);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:14px;overflow-y:auto}
#auth.hide{display:none}
#auth h1{font-size:36px;color:var(--paper)}
#auth h1 em{color:var(--neon);font-style:normal}
.lsub{font-size:12px;color:var(--neon-soft);text-align:center;margin-bottom:6px;line-height:1.5}
.panel{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.panel input{background:rgba(253,243,236,.07);border:1px solid rgba(253,243,236,.2);border-radius:10px;color:var(--paper);padding:11px 14px;font-size:14px;outline:none;width:100%}
.panel input:focus{border-color:var(--neon)}
.lrow{display:flex;gap:10px;align-items:center}
.lpreview{width:86px;height:86px;border-radius:16px;border:2px solid var(--gold);background-size:cover;flex-shrink:0}
.lpicks{flex:1;display:flex;flex-direction:column;gap:7px}
.llabel{font-size:9px;letter-spacing:.12em;color:var(--dim);font-weight:800}
.swatches{display:flex;gap:6px;flex-wrap:wrap}
.sw{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.sw.on{border-color:var(--gold)}
.hstyle{border:1px solid rgba(253,243,236,.25);background:transparent;color:var(--paper);border-radius:999px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer}
.hstyle.on{background:var(--neon);border-color:var(--neon)}
.bigbtn{margin-top:6px;padding:14px;border:none;border-radius:12px;background:var(--neon);color:#fff;font-size:16px;font-weight:800;cursor:pointer;width:100%;font-family:"Alfa Slab One",Georgia,serif;letter-spacing:.03em}
.bigbtn:disabled{opacity:.5;cursor:not-allowed}
.linkbtn{background:none;border:none;color:var(--neon-soft);font-size:13px;cursor:pointer;text-decoration:underline}
.note{font-size:10px;color:var(--dim);text-align:center;line-height:1.5}
.tabrow{display:flex;gap:8px;width:100%;max-width:360px;margin-bottom:4px}
.tab{flex:1;padding:9px;border:1px solid rgba(253,243,236,.2);background:transparent;color:var(--dim);border-radius:10px;font-weight:700;font-size:13px;cursor:pointer}
.tab.on{background:var(--neon);color:#fff;border-color:var(--neon)}
.err{color:var(--danger);font-size:12px;text-align:center;min-height:16px}

/* LOBBY */
#lobby{padding:14px}
.golive{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(180deg,#ffd75e,#ffb52e);color:#4a2a00;font-size:16px;font-weight:800;font-family:"Alfa Slab One",Georgia,serif;letter-spacing:.03em;cursor:pointer;margin-bottom:16px;box-shadow:0 4px 0 #8a5a12}
.golive:active{transform:translateY(3px);box-shadow:0 1px 0 #8a5a12}
.sectlabel{font-size:11px;letter-spacing:.12em;color:var(--dim);font-weight:800;margin:6px 2px 10px}
.roomlist{display:flex;flex-direction:column;gap:12px}
.roomcard{position:relative;border-radius:16px;overflow:hidden;border:1px solid rgba(255,61,127,.25);background:rgba(61,19,41,.4);padding:16px;cursor:pointer;transition:border-color .15s}
.roomcard:hover{border-color:var(--neon)}
.roomcard .live{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--danger);margin-bottom:6px}
.livedot{width:7px;height:7px;border-radius:50%;background:var(--danger);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.roomcard h2{font-size:22px;color:var(--gold);margin-bottom:3px}
.roomcard .tag{font-size:13px;color:var(--neon-soft);margin-bottom:8px}
.roomcard .meta{font-size:12px;color:var(--dim)}
.roomcard .yours{position:absolute;top:12px;right:12px;background:var(--neon);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:999px;letter-spacing:.08em}
.empty{text-align:center;color:var(--dim);padding:40px 20px;font-size:13px;line-height:1.7}

/* MODAL */
.modal{position:absolute;inset:0;background:rgba(20,9,15,.92);z-index:80;display:none;align-items:center;justify-content:center;padding:24px}
.modal.show{display:flex}
.mbox{background:var(--velvet-2);border:1px solid var(--neon);border-radius:16px;padding:20px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.mbox h3{font-size:18px}
.mbox input{background:rgba(253,243,236,.07);border:1px solid rgba(253,243,236,.2);border-radius:10px;color:var(--paper);padding:11px 14px;font-size:14px;outline:none}
.mbox input:focus{border-color:var(--neon)}
.mrow{display:flex;gap:8px}
.mrow button{flex:1;padding:12px;border-radius:10px;border:none;font-weight:700;cursor:pointer}
.mcancel{background:transparent;border:1.5px solid var(--dim);color:var(--dim)}
.mgo{background:var(--neon);color:#fff}

#toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:rgba(20,9,15,.95);border:1px solid var(--neon);color:var(--paper);padding:10px 18px;border-radius:12px;font-size:13px;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;max-width:88%;text-align:center}
#toast.show{opacity:1}
.spinner{width:26px;height:26px;border:3px solid rgba(255,61,127,.3);border-top-color:var(--neon);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ROOM VIEW (C1) */
#room{display:none;flex-direction:column;height:100%;overflow:hidden}
#room.show{display:flex}
.roomtop{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid rgba(255,61,127,.2);flex-shrink:0}
.backbtn{background:none;border:none;color:var(--neon-soft);font-size:20px;cursor:pointer;padding:2px 8px;line-height:1}
.roomtitle{font-size:14px;font-weight:700;font-family:"Alfa Slab One",Georgia,serif;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px}
.roomtop .cnt{font-size:12px;color:var(--neon-soft);font-weight:700}

/* STAGE — fixed proportion of the screen, holds contestant + chairs + line */
.stage{flex-shrink:0;display:flex;flex-direction:column;padding:8px 12px 6px;gap:8px}
.contestant-hero{border-radius:12px;border:2px solid var(--gold);overflow:hidden;position:relative;height:34vh;min-height:170px}
.contestant-hero .vid{position:absolute;inset:0;background-size:cover;background-position:center}
.contestant-hero .plate{position:absolute;bottom:0;left:0;right:0;padding:7px 12px;background:linear-gradient(transparent,rgba(20,9,15,.92));z-index:2}
.contestant-hero .role{font-size:9px;letter-spacing:.14em;color:var(--gold)}
.contestant-hero .nm{font-weight:700;font-size:16px;font-family:"Alfa Slab One",Georgia,serif}
.hostbadge{position:absolute;top:8px;right:8px;background:var(--neon);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:999px;letter-spacing:.08em;z-index:2}
.reactlayer{position:absolute;right:8px;bottom:6px;width:56px;z-index:3;pointer-events:none;height:80%}
.flyreact{position:absolute;bottom:0;font-size:26px;animation:flyup 2.4s ease-out forwards}
@keyframes flyup{0%{opacity:0;transform:translateY(0) scale(.5)}15%{opacity:1;transform:translateY(-20px) scale(1.2)}100%{opacity:0;transform:translateY(-160px) scale(.9) translateX(var(--drift,10px))}}

/* chairs — taller, readable */
.chairs-grid{display:flex;gap:7px;flex-shrink:0;height:128px}
.chair{flex:1;border-radius:12px;border:1px solid rgba(245,192,78,.3);background:rgba(20,9,15,.6);padding:8px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative;text-align:center}
.chair.filled{border-color:var(--gold)}
.chair.kept{border-color:var(--neon)}
.chair .cf{width:42px;height:42px;border-radius:50%;background-size:cover}
.chair .cn{font-size:11px;font-weight:700;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chair .cclock{font-family:"Courier New",monospace;font-size:15px;font-weight:800;color:var(--gold);background:#0d060a;border:1px solid rgba(245,192,78,.4);border-radius:6px;padding:1px 7px}
.chair .cclock.low{color:var(--danger);border-color:var(--danger)}
.chair .cempty{font-size:11px;color:var(--dim);font-style:italic}
.chair .kepttag{position:absolute;top:4px;right:4px;background:var(--neon);color:#fff;font-size:8px;font-weight:800;padding:1px 5px;border-radius:999px}
.chair .chearts{position:absolute;bottom:3px;left:5px;font-size:10px;color:var(--neon-soft);font-weight:700}
.chair.heart-tap{cursor:pointer}
.hostctl{display:flex;gap:4px;margin-top:2px;width:100%}
.hostctl button{flex:1;padding:4px 2px;border:none;border-radius:6px;font-size:9px;font-weight:800;cursor:pointer;text-transform:uppercase}
.hc-keep{background:var(--gold);color:#3a2a00}
.hc-pass{background:var(--danger);color:#fff}

/* line — 4 faces visible, scroll sideways for more */
.linestrip{flex-shrink:0}
.linelabel{font-size:10px;letter-spacing:.1em;color:var(--dim);font-weight:800;margin-bottom:4px}
.linelabel .watchcount{color:var(--neon-soft);margin-left:6px}
.lineitems{display:flex;gap:10px;overflow-x:auto;min-height:56px;align-items:center}
.lineface{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;width:52px;cursor:pointer}
.lineface .lf{width:44px;height:44px;border-radius:50%;background-size:cover;border:2px solid transparent}
.lineface .ln{font-size:9px;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lineface.me .lf{border-color:var(--neon)}
.lineface.pickable .lf{border-color:var(--gold)}
.emptyrole{color:var(--dim);font-size:12px;font-style:italic}

/* CHAT STRIP — fills remaining space, ~4-5 msgs, scroll up & vanish under lineup */
.chatstrip{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:3px;padding:6px 14px 2px;-webkit-mask-image:linear-gradient(transparent,#000 24px);mask-image:linear-gradient(transparent,#000 24px)}
.floatmsg{font-size:13px;line-height:1.35;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);animation:fadein .3s;flex-shrink:0}
.floatmsg .cu{font-weight:800;color:var(--neon-soft)}
.floatmsg.feed{color:var(--gold)}.floatmsg.feed.cool{color:var(--cool)}.floatmsg.feed.neon{color:var(--neon-soft)}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

/* INPUT BAR */
.inputbar{flex-shrink:0;display:flex;gap:8px;align-items:center;padding:7px 12px;border-top:1px solid rgba(253,243,236,.1)}
.inputbar input{flex:1;background:rgba(253,243,236,.08);border:1px solid rgba(253,243,236,.15);border-radius:999px;color:var(--paper);padding:9px 14px;font-size:14px;outline:none}
.inputbar input:focus{border-color:var(--neon)}
.ib-gift,.ib-send{border:none;border-radius:50%;width:38px;height:38px;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ib-gift{background:rgba(245,192,78,.15);border:1px solid rgba(245,192,78,.4)}
.ib-send{background:var(--neon);color:#fff;font-size:15px}

.roomact{padding:6px 12px 9px;display:flex;gap:8px;flex-shrink:0}
.roomact button{flex:1;padding:11px;border:none;border-radius:10px;font-weight:800;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
.joinline{background:var(--neon);color:#fff}
.leaveroom{background:transparent;border:1.5px solid var(--dim);color:var(--dim)}
.endshow{background:linear-gradient(180deg,#ffd75e,#ffb52e);color:#4a2a00;font-family:"Alfa Slab One",Georgia,serif}

.gifttray-pop{position:absolute;left:12px;right:12px;bottom:110px;z-index:40;background:rgba(20,9,15,.97);border:1px solid var(--gold);border-radius:14px;padding:12px;display:none;gap:8px;justify-content:space-around;flex-wrap:wrap}
.gifttray-pop.show{display:flex}
.giftbtn{background:rgba(245,192,78,.1);border:1px solid rgba(245,192,78,.35);border-radius:10px;padding:8px 12px;font-size:22px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.giftbtn .gc{font-size:9px;color:var(--gold);font-weight:700}
/* finale */
.endshow{background:linear-gradient(180deg,#ffd75e,#ffb52e);color:#4a2a00;border:none;border-radius:10px;padding:11px;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;font-family:"Alfa Slab One",Georgia,serif}
#finale{position:absolute;inset:0;z-index:120;background:radial-gradient(ellipse 80% 55% at 50% 20%,rgba(93,20,32,.97),rgba(20,7,4,.99));display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
#finale.show{display:flex}
#finale h1{font-size:30px;color:var(--gold);margin-bottom:6px;text-shadow:2px 2px 0 #430a13}
#finale .fsub{font-size:13px;color:var(--neon-soft);margin-bottom:20px;line-height:1.5}
.finalists{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:20px}
.finalist{border-radius:14px;border:2px solid var(--gold);background:rgba(20,9,15,.5);padding:14px;width:120px;cursor:pointer;transition:transform .15s}
.finalist:hover{transform:scale(1.05);border-color:var(--neon)}
.finalist .ff{width:64px;height:64px;border-radius:50%;background-size:cover;margin:0 auto 8px}
.finalist .fn{font-size:13px;font-weight:700}
.finalist .fh{font-size:11px;color:var(--neon-soft);margin-top:2px}
.finalist.picked{border-color:var(--neon);box-shadow:0 0 20px rgba(255,61,127,.5)}
.winnerbig{margin:10px 0 18px}
.winnerbig .wf{width:120px;height:120px;border-radius:50%;background-size:cover;margin:0 auto 12px;border:3px solid var(--gold);box-shadow:0 0 30px rgba(245,192,78,.5)}
.winnerbig .wn{font-size:24px;font-family:"Alfa Slab One",Georgia,serif;color:var(--gold)}
.fbtn{padding:13px 24px;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:14px;margin:5px}
.fbtn.gold{background:var(--gold);color:#3a2a00}
.fbtn.ghost{background:transparent;border:1.5px solid var(--dim);color:var(--dim)}
.fbtn.neon{background:var(--neon);color:#fff;font-family:"Alfa Slab One",Georgia,serif}
.recapcard{background:rgba(20,9,15,.6);border:1px solid var(--gold);border-radius:16px;padding:20px;max-width:320px;margin:0 auto}
.recapcard .rline{font-size:13px;color:var(--paper);margin:6px 0;line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">AFTER<em>HOURS</em></div>
    <div class="wallet">
      <span class="chip" id="coinchip">✦ 120</span>
      <button class="iconbtn" id="signout" style="display:none">Sign out</button>
    </div>
  </header>
  <main>
    <!-- AUTH -->
    <div id="auth">
      <h1>AFTER<em>HOURS</em></h1>
      <div class="lsub">The live dating game show.<br>Create yourself to step inside.</div>
      <div class="tabrow">
        <button class="tab on" id="tab_signup">New here</button>
        <button class="tab" id="tab_login">I have an account</button>
      </div>
      <div class="panel" id="signupPanel">
        <div class="lrow">
          <div class="lpreview" id="lpreview"></div>
          <div class="lpicks">
            <div class="llabel">SKIN</div><div class="swatches" id="lskin"></div>
            <div class="llabel">HAIR</div><div class="swatches" id="lhaircolor"></div>
          </div>
        </div>
        <div class="swatches" id="lhairstyle"></div>
        <input type="text" id="su_name" placeholder="Display name" maxlength="18">
        <input type="text" id="su_occ" placeholder="Occupation — she'll see this on your card" maxlength="26">
        <input type="text" id="su_bio" placeholder="One line about you — make it count" maxlength="70">
        <input type="email" id="su_email" placeholder="Email">
        <input type="password" id="su_pass" placeholder="Password (6+ characters)">
        <div class="err" id="su_err"></div>
        <button class="bigbtn" id="su_go">Create account &amp; step inside</button>
      </div>
      <div class="panel" id="loginPanel" style="display:none">
        <input type="email" id="li_email" placeholder="Email">
        <input type="password" id="li_pass" placeholder="Password">
        <div class="err" id="li_err"></div>
        <button class="bigbtn" id="li_go">Log in</button>
      </div>
      <div class="note">Pilot build · play money · this is a private test with friends.</div>
    </div>

    <!-- LOBBY -->
    <div id="lobby" style="display:none">
      <button class="golive" id="golive">● GO LIVE — Host Your Room</button>
      <div class="sectlabel">LIVE NOW</div>
      <div class="roomlist" id="roomlist"></div>
    </div>

    <!-- ROOM — full show on one screen -->
    <div id="room">
      <div class="roomtop">
        <button class="backbtn" id="roomback">‹ Lobby</button>
        <div class="roomtitle" id="rt_title"></div>
        <div class="cnt" id="rt_count">👁 0</div>
      </div>

      <!-- STAGE: contestant + chairs + line, fixed, always visible -->
      <div class="stage" id="rt_stage">
        <div class="contestant-hero" id="rt_hero">
          <div class="vid" id="rt_vid"></div>
          <div class="hostbadge" id="rt_hostbadge" style="display:none">HOST</div>
          <div class="plate"><div class="role">CONTESTANT</div><div class="nm" id="rt_host"></div></div>
          <div class="reactlayer" id="rt_reactlayer"></div>
        </div>
        <div class="chairs-grid" id="rt_chairs"></div>
        <div class="linestrip">
          <div class="linelabel">THE LINE <span id="rt_hosthint" style="display:none">· tap to seat</span> <span class="watchcount" id="rt_watchbar"></span></div>
          <div class="lineitems" id="rt_line"><span class="emptyrole">empty</span></div>
        </div>
      </div>

      <!-- CHAT STRIP: ~4-5 messages scroll up and vanish under the lineup -->
      <div class="chatstrip" id="rt_livelayer"></div>

      <!-- INPUT BAR -->
      <div class="inputbar">
        <input type="text" id="rt_chatinput" placeholder="Say something…" maxlength="140">
        <button class="ib-gift" id="rt_giftbtn">🎁</button>
        <button class="ib-send" id="rt_chatsend">➤</button>
      </div>

      <!-- host: last call. suitor: join/leave line. exit is the ‹ Lobby arrow up top. -->
      <div class="roomact">
        <button class="endshow" id="rt_endshow" style="display:none">🎬 Last Call</button>
        <button class="joinline" id="rt_joinline">Join the Line</button>
      </div>

      <div class="gifttray-pop" id="rt_gifts"></div>
      <div id="finale"><div id="finale_inner"></div></div>
    </div>

    <!-- GO LIVE MODAL -->
    <div class="modal" id="livemodal">
      <div class="mbox">
        <h3>Go live</h3>
        <input type="text" id="gl_name" placeholder="Your show name (e.g. Marisol's Room)" maxlength="30">
        <input type="text" id="gl_tag" placeholder="Tagline — what you're looking for" maxlength="60">
        <div class="mrow">
          <button class="mcancel" onclick="document.getElementById('livemodal').classList.remove('show')">Cancel</button>
          <button class="mgo" id="gl_go">Go Live</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>
  </main>
</div>

<script>

/* ============ LOBBY ============ */
async function loadRooms(){
  const list=$("roomlist");
  list.innerHTML='<div class="spinner"></div>';
  const {data:rooms,error}=await sb.from("rooms").select("*").eq("status","live").order("created_at",{ascending:false});
  if(error){list.innerHTML='<div class="empty">Couldn\'t load rooms: '+error.message+'</div>';return;}
  if(!rooms||!rooms.length){
    list.innerHTML='<div class="empty">No live rooms yet.<br>Be the first — hit <b>GO LIVE</b> and your friends will see your room appear here in real time.</div>';
    return;
  }
  // member counts
  const ids=rooms.map(r=>r.id);
  const {data:members}=await sb.from("room_members").select("room_id,role").in("room_id",ids);
  const counts={};
  (members||[]).forEach(m=>{ if(m.role!=='gone'){counts[m.room_id]=(counts[m.room_id]||0)+1;} });
  list.innerHTML="";
  rooms.forEach(r=>{
    const card=document.createElement("div"); card.className="roomcard";
    const mine=r.host_id===ME.id;
    card.innerHTML=`${mine?'<div class="yours">YOUR ROOM</div>':''}
      <div class="live"><span class="livedot"></span>LIVE</div>
      <h2>${escapeHtml(r.contestant_name||"Untitled Room")}</h2>
      <div class="tag">${escapeHtml(r.tagline||"")}</div>
      <div class="meta">👁 ${counts[r.id]||0} in the room</div>`;
    card.onclick=()=>openRoom(r);
    list.appendChild(card);
  });
}
function escapeHtml(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* live lobby updates: when any room is created/ended, refresh */
function subscribeLobby(){
  sb.channel("lobby")
    .on("postgres_changes",{event:"*",schema:"public",table:"rooms"},()=>loadRooms())
    .on("postgres_changes",{event:"*",schema:"public",table:"room_members"},()=>loadRooms())
    .subscribe();
}

// pull fresh, ghost-filtered members via active_members RPC
async function loadRoomState(){
  if(!CURRENT_ROOM) return;
  const {data:members,error}=await sb.rpc("active_members",{room_id:CURRENT_ROOM.id});
  if(error){console.log("active_members:",error.message);return;}
  const present=(members||[]).filter(m=>m.user_id!==CURRENT_ROOM.host_id && m.role!=="gone");
  const uids=[...new Set(present.map(m=>m.user_id))];
  let profs={};
  if(uids.length){
    const {data:pl}=await sb.from("profiles").select("id,display_name,face_json").in("id",uids);
    (pl||[]).forEach(p=>profs[p.id]=p);
  }
  ROOM_STATE={members:present,profs};
  renderRoom();
}

function renderRoom(){
  const {members,profs}=ROOM_STATE;
  const chairs=members.filter(m=>m.role==="chair"||m.role==="kept").sort((a,b)=>(a.seat_index||0)-(b.seat_index||0));
  const line=members.filter(m=>m.role==="line");
  const specs=members.filter(m=>m.role==="spectator");
  $("rt_count").textContent="👁 "+members.length;

  // CHAIRS: fixed 3 slots
  const chairBySeat={}; chairs.forEach(c=>{ chairBySeat[c.seat_index==null?0:c.seat_index]=c; });
  let chairsHtml="";
  for(let i=0;i<3;i++){
    const c=chairBySeat[i];
    if(c){
      const p=profs[c.user_id]; const nm=p?.display_name||"someone";
      const fc=p?.face_json?faceCss(p.face_json):"#555";
      const kept=c.role==="kept";
      const secs=clockRemaining(c);
      chairsHtml+=`<div class="chair filled${kept?' kept':''} heart-tap" data-heartuid="${c.user_id}">
        ${kept?'<div class="kepttag">KEPT ✦</div>':''}
        <div class="cf" style="background:${fc}"></div>
        <div class="cn">${escapeHtml(nm)}${c.user_id===ME.id?' (you)':''}</div>
        ${kept?'':`<div class="cclock${secs<=10?' low':''}" data-uid="${c.user_id}">${fmtClock(secs)}</div>`}
        <div class="chearts" data-hearts="${c.user_id}">♥ ${HEARTS[c.user_id]||0}</div>
        ${(AMHOST&&!kept)?`<div class="hostctl"><button class="hc-keep" data-uid="${c.user_id}">Keep</button><button class="hc-pass" data-uid="${c.user_id}">Pass</button></div>`:''}
      </div>`;
    } else {
      chairsHtml+=`<div class="chair"><div class="cempty">empty chair</div></div>`;
    }
  }
  $("rt_chairs").innerHTML=chairsHtml;

  // LINE — horizontal face strip
  const lineFace=(m)=>{
    const p=profs[m.user_id]; const nm=p?.display_name||"someone";
    const fc=p?.face_json?faceCss(p.face_json):"#555"; const isMe=m.user_id===ME.id;
    const pickable=AMHOST?' pickable':'';
    return `<div class="lineface${isMe?' me':''}${pickable}" data-uid="${m.user_id}"><div class="lf" style="background:${fc}"></div><div class="ln">${isMe?'You':escapeHtml(nm)}</div></div>`;
  };
  $("rt_line").innerHTML = line.length? line.map(lineFace).join("") : '<span class="emptyrole">empty — no one waiting</span>';
  $("rt_hosthint").style.display = (AMHOST && line.length) ? "inline" : "none";

  // WATCHING — count only
  $("rt_watchbar").textContent = specs.length ? ("· 👀 "+specs.length) : "";

  // host: tap line face to seat, keep/pass on chairs
  if(AMHOST){
    $("rt_line").querySelectorAll(".pickable").forEach(el=>{
      el.onclick=()=>hostSeat(el.dataset.uid);
    });
    $("rt_chairs").querySelectorAll(".hc-keep").forEach(b=>b.onclick=(e)=>{e.stopPropagation();hostKeep(b.dataset.uid);});
    $("rt_chairs").querySelectorAll(".hc-pass").forEach(b=>b.onclick=(e)=>{e.stopPropagation();hostPass(b.dataset.uid);});
  } else {
    // non-host: tap a line face to heart that suitor too
    $("rt_line").querySelectorAll(".lineface").forEach(el=>{
      if(el.dataset.uid!==ME.id) el.onclick=()=>sendHeart(el.dataset.uid);
    });
  }
  // everyone: tap a seated suitor to heart
  $("rt_chairs").querySelectorAll(".heart-tap").forEach(el=>{
    el.onclick=(ev)=>{ if(ev.target.closest(".hostctl")) return; sendHeart(el.dataset.heartuid, ev.clientX, ev.clientY); };
  });
  updateJoinBtn();
}

/* ---- server-time offset: every viewer computes the clock against the SERVER's now,
   not their own device clock, so two devices with skewed clocks stay in sync ---- */
let SERVER_OFFSET=0; // ms to add to local Date.now() to get server time
async function syncServerClock(){
  try{
    const t0=Date.now();
    const {data,error}=await sb.rpc("server_now");
    const t1=Date.now();
    if(error||!data) return;
    const serverMs=new Date(data).getTime();
    const rtt=t1-t0;
    // estimate server "now" at the moment our response arrived, minus half the round trip
    SERVER_OFFSET = serverMs + rtt/2 - t1;
  }catch(e){ /* leave offset 0 */ }
}
function serverNow(){ return Date.now()+SERVER_OFFSET; }

/* ---- synced clock: compute remaining from seated_at + clock_left against SERVER time ---- */
function clockRemaining(c){
  if(!c.seated_at || c.clock_left==null) return c.clock_left||0;
  const elapsed=(serverNow()-new Date(c.seated_at).getTime())/1000;
  return Math.max(0, Math.round(c.clock_left - elapsed));
}
function fmtClock(s){ s=Math.max(0,s); const m=Math.floor(s/60); const ss=s%60; return m+":"+(ss<10?"0":"")+ss; }

// tick re-renders clock numbers each second; host also fires timeout when a chair expires
let TIMING_OUT={};
function startClockTick(){
  stopClockTick();
  CLOCK_TICK=setInterval(()=>{
    ROOM_STATE.members.filter(m=>m.role==="chair").forEach(c=>{
      const s=clockRemaining(c);
      const el=$("rt_chairs")?.querySelector(`.cclock[data-uid="${c.user_id}"]`);
      if(el){ el.textContent=fmtClock(s); el.classList.toggle("low",s<=10); }
      // host drives expiry: when time's up, drop them to spectator (once)
      if(AMHOST && s<=0 && !TIMING_OUT[c.user_id]){
        TIMING_OUT[c.user_id]=true;
        sb.rpc("timeout_member",{room_id:CURRENT_ROOM.id,user_id:c.user_id}).then(({error})=>{
          if(error) console.log("timeout:",error.message);
          delete TIMING_OUT[c.user_id];
          loadRoomState();
        });
      }
    });
  },1000);
}
function stopClockTick(){ if(CLOCK_TICK){clearInterval(CLOCK_TICK);CLOCK_TICK=null;} TIMING_OUT={}; }

/* ---- heartbeat: keep our presence fresh so we don't ghost ---- */
function startHeartbeat(){
  stopHeartbeat();
  if(AMHOST) return; // host has no membership row to beat
  sb.rpc("heartbeat",{room_id:CURRENT_ROOM.id});
  HEARTBEAT=setInterval(()=>{ if(CURRENT_ROOM) sb.rpc("heartbeat",{room_id:CURRENT_ROOM.id}); },15000);
}
function stopHeartbeat(){ if(HEARTBEAT){clearInterval(HEARTBEAT);HEARTBEAT=null;} }

/* best-effort clean exit: fire leave_room when the tab closes or is hidden,
   so members don't ghost for 60s waiting on the freshness window */
let LEFT_ON_UNLOAD=false;
function bestEffortLeave(){
  if(LEFT_ON_UNLOAD || !CURRENT_ROOM || AMHOST) return;
  LEFT_ON_UNLOAD=true;
  try{ sb.rpc("leave_room",{room_id:CURRENT_ROOM.id}); }catch(e){}
}
window.addEventListener("pagehide",bestEffortLeave);
window.addEventListener("beforeunload",bestEffortLeave);
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="hidden") bestEffortLeave();
  else if(document.visibilityState==="visible" && CURRENT_ROOM && !AMHOST){
    // came back — re-register presence
    LEFT_ON_UNLOAD=false;
    sb.rpc("join_room",{room_id:CURRENT_ROOM.id});
    sb.rpc("heartbeat",{room_id:CURRENT_ROOM.id});
    loadRoomState();
  }
});

/* host doesn't receive room_members realtime pushes (no membership row / RLS),
   so poll the roster as a fallback. also: everyone polls room status so a
   suitor knows when the host ended the show. */
let HOST_POLL=null;
function startHostPoll(){
  stopHostPoll();
  HOST_POLL=setInterval(async()=>{
    if(!CURRENT_ROOM) return;
    if(AMHOST){
      // sweep stale (abandoned) members to 'gone' before reading, so ghosts
      // don't inflate the roster. safe to call repeatedly; no-op if none stale.
      try{ await sb.rpc("sweep_stale_members",{room_id:CURRENT_ROOM.id}); }catch(e){}
      await loadRoomState();
      autoSeatFromLine();  // fill any open chair with the next person in line
    }
    // everyone: detect the room being ended out from under them
    const {data:rm}=await sb.from("rooms").select("status,winner_id").eq("id",CURRENT_ROOM.id).single();
    if(rm && rm.status==="ended" && !$("finale").classList.contains("show")){
      renderFinale(rm.winner_id||null);
    }
  },4000);
}
function stopHostPoll(){ if(HOST_POLL){clearInterval(HOST_POLL);HOST_POLL=null;} }

// auto-seat: while chairs are open and people wait, seat them (host drives it)
let AUTOSEATING=false;
async function autoSeatFromLine(){
  if(!AMHOST || AUTOSEATING) return;
  const seated=ROOM_STATE.members.filter(m=>m.role==="chair"||m.role==="kept");
  const line=ROOM_STATE.members.filter(m=>m.role==="line");
  if(seated.length>=3 || !line.length) return;
  AUTOSEATING=true;
  const next=line[0];
  await hostSeat(next.user_id);
  AUTOSEATING=false;
}

/* ---- host actions ---- */
async function hostSeat(uid){
  // find first empty seat 0..2
  const taken=new Set(ROOM_STATE.members.filter(m=>m.role==="chair"||m.role==="kept").map(m=>m.seat_index==null?0:m.seat_index));
  let seat=-1; for(let i=0;i<3;i++){ if(!taken.has(i)){seat=i;break;} }
  if(seat<0){ toast("All chairs full — keep or pass someone first."); return; }
  const {error}=await sb.rpc("seat_member",{room_id:CURRENT_ROOM.id,user_id:uid,seat_index:seat});
  if(error){ toast("Seat failed: "+error.message); return; }
  loadRoomState();
}
async function hostKeep(uid){
  const {error}=await sb.rpc("keep_member",{room_id:CURRENT_ROOM.id,user_id:uid});
  if(error){ toast("Keep failed: "+error.message); return; }
  loadRoomState();
}
async function hostPass(uid){
  const {error}=await sb.rpc("pass_member",{room_id:CURRENT_ROOM.id,user_id:uid});
  if(error){ toast("Pass failed: "+error.message); return; }
  loadRoomState();
}

$("rt_giftbtn").onclick=()=>$("rt_gifts").classList.toggle("show");

async function sendHeart(targetUid,x,y){
  if(targetUid===ME.id){ toast("You can't heart yourself — that's for the crowd to decide."); return; }
  flyReact("❤️");
  HEARTS[targetUid]=(HEARTS[targetUid]||0)+1;
  const el=$("rt_chairs")?.querySelector(`[data-hearts="${targetUid}"]`);
  if(el) el.textContent="♥ "+HEARTS[targetUid];
  const {error:he}=await sb.from("room_events").insert({room_id:CURRENT_ROOM.id,user_id:ME.id,type:"heart",payload:{target:targetUid}});
  if(he) console.log("heart insert:",he.message);
}

async function sendGift(gi){
  const g=GIFTS[gi];
  if(COINS<g.cost){ toast("Not enough ✦ for "+g.name); return; }
  COINS-=g.cost; updateWallet();
  flyReact(g.emoji,true);
  const {error:ge}=await sb.from("room_events").insert({room_id:CURRENT_ROOM.id,user_id:ME.id,type:"gift",payload:{emoji:g.emoji,cost:g.cost,name:g.name}});
  if(ge){ console.log("gift insert:",ge.message); COINS+=g.cost; updateWallet(); toast("Gift failed to send"); }
}

async function sendChat(){
  const inp=$("rt_chatinput"); const txt=inp.value.trim();
  if(!txt) return;
  inp.value="";
  const {error:ce}=await sb.from("room_events").insert({room_id:CURRENT_ROOM.id,user_id:ME.id,type:"chat",payload:{text:txt}});
  if(ce) console.log("chat insert:",ce.message);
}
$("rt_chatsend").onclick=sendChat;
$("rt_chatinput").addEventListener("keydown",e=>{ if(e.key==="Enter") sendChat(); });

/* reactions fly up the right side of the stage */
function flyReact(em,big){
  const layer=$("rt_reactlayer"); if(!layer) return;
  const f=document.createElement("div"); f.className="flyreact"; f.textContent=em;
  if(big) f.style.fontSize="38px";
  f.style.left=(Math.random()*24)+"px";
  f.style.setProperty("--drift",(Math.random()*30-15)+"px");
  layer.appendChild(f); setTimeout(()=>f.remove(),2400);
}

/* names for feed/chat: resolve from cache, host, or fetch on demand */
const PROF_CACHE={};
function nameFor(uid){
  if(CURRENT_ROOM && uid===CURRENT_ROOM.host_id) return HOST_PROFILE?.display_name||"Host";
  if(uid===ME.id) return MYPROFILE?.display_name||"You";
  return ROOM_STATE.profs[uid]?.display_name || PROF_CACHE[uid]?.display_name || "someone";
}
async function ensureProfile(uid){
  if(!uid || uid===ME.id || (CURRENT_ROOM&&uid===CURRENT_ROOM.host_id)) return;
  if(ROOM_STATE.profs[uid]||PROF_CACHE[uid]) return;
  const {data}=await sb.from("profiles").select("id,display_name,face_json").eq("id",uid).single();
  if(data) PROF_CACHE[uid]=data;
}

/* chat + feed: append; older ones scroll up and fade under the lineup mask */
function floatMsg(html,extraCls){
  const layer=$("rt_livelayer"); if(!layer) return;
  const d=document.createElement("div"); d.className="floatmsg"+(extraCls?(" "+extraCls):"");
  d.innerHTML=html;
  layer.appendChild(d);
  while(layer.children.length>12) layer.removeChild(layer.firstChild);
}
function addFeedLine(html,cls){ floatMsg(html,"feed"+(cls?(" "+cls):"")); }
function addChatLine(uid,text){ floatMsg(`<span class="cu">${escapeHtml(nameFor(uid))}:</span> ${escapeHtml(text)}`); }

/* handle a realtime event row */
async function handleEvent(ev){
  if(!ev) return;
  const p=ev.payload||{};
  const actor=ev.user_id;
  // make sure we can name the actor / target
  await ensureProfile(actor);
  if(p.target_user) await ensureProfile(p.target_user);
  switch(ev.type){
    case "heart":
      if(p.target && actor!==ME.id){ // count others' hearts (ours already counted optimistically)
        HEARTS[p.target]=(HEARTS[p.target]||0)+1;
        const el=$("rt_chairs")?.querySelector(`[data-hearts="${p.target}"]`);
        if(el) el.textContent="♥ "+HEARTS[p.target];
      }
      break;
    case "chat":
      if(p.text) addChatLine(actor,p.text);
      break;
    case "gift":
      addFeedLine(`<span class="who">${escapeHtml(nameFor(actor))}</span> sent ${p.emoji||"a gift"} <span style="opacity:.7">✦${p.cost||""}</span>`,"gold");
      if(actor!==ME.id) flyReact(p.emoji||"🎁",true);
      break;
    case "seat":
      addFeedLine(`<span class="who">${escapeHtml(nameFor(p.target_user))}</span> took a chair 🎬`,"cool");
      break;
    case "keep":
      addFeedLine(`<span class="who">${escapeHtml(nameFor(p.target_user))}</span> was KEPT ✦✦✦`,"gold");
      break;
    case "pass":
      addFeedLine(`<span class="who">${escapeHtml(nameFor(p.target_user))}</span> was passed ✕`,"neon");
      loadRoomState();
      break;
    case "timeout":
      addFeedLine(`<span class="who">${escapeHtml(nameFor(p.target_user))}</span>'s time ran out ⏱ — back to watching`,"cool");
      loadRoomState();
      break;
    case "block":
      addFeedLine(`someone was removed from the room`,"neon");
      break;
    case "finale":
      renderFinale((p.winner_id!==undefined && p.winner_id!==null) ? p.winner_id : null);
      break;
  }
}

/* seed feed/chat/hearts from recent history on room entry */
async function loadEventHistory(){
  HEARTS={};
  // hearts reflect the current seated suitors' tallies (persist across the show),
  // but chat/gifts/feed only show what happens from the moment you enter — like
  // walking into a live stream. so we seed hearts from all events, but DON'T
  // replay chat/gift/feed lines from before entry.
  const {data:events}=await sb.from("room_events").select("*").eq("room_id",CURRENT_ROOM.id).order("created_at",{ascending:true}).limit(200);
  const ll=$("rt_livelayer"); if(ll) ll.innerHTML="";
  for(const ev of (events||[])){
    if(ev.type==="heart" && ev.payload?.target){ HEARTS[ev.payload.target]=(HEARTS[ev.payload.target]||0)+1; }
  }
  // chat/reactions start fresh — nothing replayed. new events stream in live from here.
  renderRoom();
}

/* ============ FINALE ============ */
$("rt_endshow").onclick=()=>{ if(AMHOST) showLastCall(); };
function keptFinalists(){ return ROOM_STATE.members.filter(m=>m.role==="kept"); }

function showLastCall(){
  const finalists=keptFinalists();
  const inner=$("finale_inner");
  if(!finalists.length){
    inner.innerHTML=`<h1>LAST CALL</h1>
      <div class="fsub">No one's been kept — there's no finalist board.<br>You can still close the show.</div>
      <button class="fbtn ghost" id="fin_walk">End with no match</button>
      <button class="fbtn ghost" id="fin_cancel">Not yet</button>`;
  } else {
    inner.innerHTML=`<h1>LAST CALL</h1>
      <div class="fsub">Your finalists. Choose the one — or walk away and keep them all as callbacks.</div>
      <div class="finalists" id="fin_board"></div>
      <button class="fbtn ghost" id="fin_walk">Walk alone →</button>
      <button class="fbtn ghost" id="fin_cancel">Not yet</button>`;
    const board=$("fin_board");
    finalists.forEach(f=>{
      const p=ROOM_STATE.profs[f.user_id]; const nm=p?.display_name||"someone";
      const fc=p?.face_json?faceCss(p.face_json):"#555";
      const d=document.createElement("div"); d.className="finalist";
      d.innerHTML=`<div class="ff" style="background:${fc}"></div><div class="fn">${escapeHtml(nm)}</div><div class="fh">♥ ${HEARTS[f.user_id]||0}</div>`;
      d.onclick=()=>confirmWinner(f.user_id,nm);
      board.appendChild(d);
    });
  }
  $("finale").classList.add("show");
  $("fin_walk")?.addEventListener("click",()=>endShow(null));
  $("fin_cancel")?.addEventListener("click",()=>$("finale").classList.remove("show"));
}

function confirmWinner(uid,nm){
  const inner=$("finale_inner");
  inner.innerHTML=`<h1>CHOOSE ${escapeHtml(nm)}?</h1>
    <div class="fsub">This ends the show. ${escapeHtml(nm)} is your pick — the two of you leave together.</div>
    <button class="fbtn neon" id="fin_confirm">Yes — it's ${escapeHtml(nm)}</button>
    <button class="fbtn ghost" id="fin_back">Back</button>`;
  $("fin_confirm").onclick=()=>endShow(uid);
  $("fin_back").onclick=()=>showLastCall();
}

async function endShow(winnerUid){
  const {error}=await sb.rpc("end_show",{room_id:CURRENT_ROOM.id,winner_id:winnerUid});
  if(error){ toast("Couldn't end show: "+error.message); return; }
}

function renderFinale(winnerUid){
  const inner=$("finale_inner");
  if(winnerUid){
    const p=ROOM_STATE.profs[winnerUid]||PROF_CACHE[winnerUid];
    const nm=p?.display_name||"the winner";
    const fc=p?.face_json?faceCss(p.face_json):"#555";
    inner.innerHTML=`<h1>IT'S ${escapeHtml(nm.toUpperCase())}</h1>
      <div class="winnerbig"><div class="wf" style="background:${fc}"></div><div class="wn">${escapeHtml(nm)}</div></div>
      <div class="fsub">${escapeHtml(CURRENT_ROOM.contestant_name||"The contestant")} made their choice.<br>They're leaving together — the crowd funded the spectacle, the prize is privacy.</div>
      <div class="recapcard">
        <div class="rline">🎬 <b>${escapeHtml(CURRENT_ROOM.contestant_name||"")}</b>'s show</div>
        <div class="rline">👑 Winner: <b>${escapeHtml(nm)}</b></div>
        <div class="rline">The room made its call. That's a wrap.</div>
      </div>
      <button class="fbtn gold" id="fin_done" style="margin-top:16px">Back to lobby</button>`;
  } else {
    inner.innerHTML=`<h1>WALKED ALONE</h1>
      <div class="fsub">No match tonight — but the kept finalists become callbacks.<br>To be continued.</div>
      <div class="recapcard">
        <div class="rline">🎬 <b>${escapeHtml(CURRENT_ROOM.contestant_name||"")}</b>'s show</div>
        <div class="rline">🚶 Walked alone — no match</div>
        <div class="rline">Callbacks saved. The story continues another night.</div>
      </div>
      <button class="fbtn gold" id="fin_done" style="margin-top:16px">Back to lobby</button>`;
  }
  $("finale").classList.add("show");
  $("fin_done").onclick=()=>{ $("finale").classList.remove("show"); leaveRoom(); };
}

function subscribeRoom(roomId){
  if(ROOM_CHANNEL){ sb.removeChannel(ROOM_CHANNEL); ROOM_CHANNEL=null; }
  ROOM_CHANNEL=sb.channel("room:"+roomId)
    .on("postgres_changes",{event:"*",schema:"public",table:"room_members",filter:"room_id=eq."+roomId},()=>loadRoomState())
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"room_events",filter:"room_id=eq."+roomId},(payload)=>{
      handleEvent(payload.new);
      // membership-affecting events also refresh roster
      if(["seat","keep","pass","block","timeout"].includes(payload.new.type)) loadRoomState();
    })
    .subscribe();
}

$("rt_joinline").onclick=async()=>{
  const me=ROOM_STATE.members.find(m=>m.user_id===ME.id);
  if(me && me.role==="line"){
    // already in line — leave the line (back to spectator)
    const {error}=await sb.rpc("leave_room",{room_id:CURRENT_ROOM.id});
    if(!error){ await sb.rpc("join_room",{room_id:CURRENT_ROOM.id}); }
    loadRoomState();
    return;
  }
  const {error}=await sb.rpc("join_line",{room_id:CURRENT_ROOM.id});
  if(error){toast("Couldn't join line: "+error.message);return;}
  toast("You're in the line.");
  loadRoomState();
};
function updateJoinBtn(){
  if(AMHOST){ $("rt_joinline").style.display="none"; return; }
  const me=ROOM_STATE.members.find(m=>m.user_id===ME.id);
  const btn=$("rt_joinline");
  if(me && (me.role==="chair"||me.role==="kept")){ btn.style.display="none"; }
  else if(me && me.role==="line"){ btn.style.display="block"; btn.textContent="Leave Line"; }
  else { btn.style.display="block"; btn.textContent="Join the Line"; }
}

$("roomback").onclick=()=>leaveRoom();
async function leaveRoom(){
  const leaving=CURRENT_ROOM;
  stopHeartbeat(); stopClockTick(); stopHostPoll();
  if(ROOM_CHANNEL){ sb.removeChannel(ROOM_CHANNEL); ROOM_CHANNEL=null; }
  if(leaving){
    if(leaving.host_id===ME.id){
      // the host IS the show — leaving ends it (unless already ended via finale)
      const {error}=await sb.rpc("end_show",{room_id:leaving.id,winner_id:null});
      if(error) console.log("host end_show on leave:",error.message);
    } else {
      const {error}=await sb.rpc("leave_room",{room_id:leaving.id});
      if(error) console.log("leave_room:",error.message);
    }
  }
  CURRENT_ROOM=null;
  $("room").classList.remove("show");
  $("lobby").style.display="block";
  loadRooms();
}

/* ============ SESSION RESTORE ============ */
(async()=>{
  buildPickers();
  const {data:{session}}=await sb.auth.getSession();
  if(session){ enterApp(); }
})();
</script>
